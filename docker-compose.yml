services:
  main_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ia_main_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  medgemma_backend:
    build:
      context: ./Medgemma/backend
      dockerfile: Dockerfile
    container_name: ia_medgemma_backend
    volumes:
      - ./Medgemma/backend:/app
    ports:
      - "8001:8001"
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ia_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5174"
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - main_backend
      - medgemma_backend
    restart: unless-stopped
